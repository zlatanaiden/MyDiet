spring.application.name=backend

# Database connection settings
# ========================
# Database (MySQL)
# ========================
spring.datasource.url=jdbc:mysql://localhost:3306/mydiet_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Lx20041020
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Print SQL statements in the console for debugging
# ========================
# JPA / Hibernate
# ========================
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# ========================
# SQL Init
# ========================
spring.sql.init.mode=always

# ========================
# Google OAuth2
# ========================
spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=email,profile

# ========================
# Frontend
# ========================
app.frontend-url=http://localhost:5173