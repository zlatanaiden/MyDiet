spring.application.name=backend
# Database connection settings
spring.datasource.url=jdbc:mysql://localhost:3306/mydiet_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=UTC
spring.datasource.username=root
# Leave the password blank if your local MySQL root user has no password
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Print SQL statements in the console for debugging
spring.jpa.show-sql=true
# Automatically update database table schemas (great for development)
spring.jpa.hibernate.ddl-auto=update
# Run schema.sql on startup
spring.sql.init.mode=always